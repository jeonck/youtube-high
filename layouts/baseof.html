<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ site.Title }}</title>
<style>
:root {
  --bg: #f7f8fa; --panel: #ffffff; --border: #e2e6ea;
  --text: #1f2933; --muted: #66707c; --link: #0b66c3;
  --red: #c62828; --amber: #a05a00; --blue: #0b66c3; --green: #1b7f3b;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text);
  font: 16px/1.65 -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
.wrap { max-width: 860px; margin: 0 auto; padding: 1.2rem 1rem 4rem; }
header.site { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); padding-bottom: .8rem; margin-bottom: 1.4rem; }
header.site h1 { font-size: 1.25rem; margin: 0; }
header.site h1 a { color: var(--text); }
header.site nav { display: flex; gap: .7rem; font-size: .85rem; }
h2.sec { font-size: 1.02rem; margin: 2rem 0 .6rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .04em; }
.card { background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: .75rem .95rem; margin-bottom: .55rem; }
.card .top { display: flex; gap: .5rem; align-items: baseline; flex-wrap: wrap; }
.card .title { font-weight: 600; }
.card .meta { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
.card .body { font-size: .88rem; color: var(--text); margin-top: .4rem; }
.card .body ul { margin: 0; padding-left: 1.1rem; }
.badge { font-size: .7rem; font-weight: 700; padding: .1rem .45rem;
  border-radius: 99px; white-space: nowrap; }
.badge.즉시조치 { background: #fdecea; color: var(--red); border: 1px solid var(--red); }
.badge.백로그 { background: #fff3dc; color: var(--amber); border: 1px solid var(--amber); }
.badge.학습 { background: #e8f1fb; color: var(--blue); border: 1px solid var(--blue); }
.badge.status완료 { background: #e7f4ec; color: var(--green); border: 1px solid var(--green); }
.badge.status대기 { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.empty { color: var(--muted); font-size: .88rem; padding: .4rem 0; }
.tags a { font-size: .74rem; color: var(--muted); margin-right: .4rem; }
article.single h1 { font-size: 1.4rem; margin-bottom: .3rem; }
article.single .content { margin-top: 1rem; }
/* 코드블록(영상 스크립트) — 단일 포스트와 카드 목록 모두에서 박스 안에서 줄바꿈 */
pre { max-width: 100%; border-radius: 8px; padding: .9rem 1rem !important;
  font-size: .85rem; line-height: 1.6; overflow-x: auto; }
pre code, pre code span {
  white-space: pre-wrap !important; word-break: break-word; overflow-wrap: anywhere; }
pre code > span { display: block !important; min-width: 0; }
/* 코드블록 복사 버튼 (JS로 주입) */
.codewrap { position: relative; }
.copybtn { position: absolute; top: .5rem; right: .5rem; z-index: 2;
  font: 600 .72rem/1 -apple-system, sans-serif; color: #d7dbe0;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22);
  border-radius: 6px; padding: .32rem .55rem; cursor: pointer;
  transition: background .15s, color .15s; }
.copybtn:hover { background: rgba(255,255,255,.22); color: #fff; }
.copybtn.copied { background: var(--green); border-color: var(--green); color: #fff; }
.codewrap pre { padding-top: 1.9rem !important; }
footer.site { margin-top: 3rem; border-top: 1px solid var(--border);
  padding-top: .8rem; font-size: .78rem; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <h1><a href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a></h1>
    <nav>
      <a href="{{ "verdict/즉시조치/" | relURL }}">즉시조치</a>
      <a href="{{ "verdict/백로그/" | relURL }}">백로그</a>
      <a href="{{ "verdict/학습/" | relURL }}">학습</a>
      <a href="{{ "status/완료/" | relURL }}">완료</a>
      <a href="{{ "tags/" | relURL }}">태그</a>
    </nav>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <footer class="site">매일 아침 자동 수집 · Claude 판정 기준: <a href="https://github.com/jeonck/youtube-high/blob/main/context.md">context.md</a></footer>
</div>
<script>
(function () {
  document.querySelectorAll("pre").forEach(function (pre) {
    if (pre.parentElement.classList.contains("codewrap")) return;
    var code = pre.querySelector("code");
    if (!code) return;
    var wrap = document.createElement("div");
    wrap.className = "codewrap";
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    var btn = document.createElement("button");
    btn.className = "copybtn";
    btn.type = "button";
    btn.textContent = "복사";
    btn.addEventListener("click", function () {
      var text = code.innerText;
      var done = function () {
        btn.textContent = "복사됨";
        btn.classList.add("copied");
        setTimeout(function () {
          btn.textContent = "복사";
          btn.classList.remove("copied");
        }, 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () { fallback(text, done); });
      } else {
        fallback(text, done);
      }
    });
    wrap.appendChild(btn);
  });
  function fallback(text, done) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); done(); } catch (e) {}
    document.body.removeChild(ta);
  }
})();
</script>
</body>
</html>
