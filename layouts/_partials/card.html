<div class="card">
  <div class="top">
    <span class="badge {{ .Params.verdict }}">{{ .Params.verdict }}</span>
    {{ if eq .Params.status "완료" }}<span class="badge status완료">완료</span>{{ end }}
    <span class="title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></span>
  </div>
  <div class="meta">
    {{ .Date.Format "2006-01-02" }} · {{ .Params.source_name }} ·
    <a href="{{ .Params.source }}" target="_blank" rel="noopener">원문 ↗</a>
    <span class="tags">{{ range .Params.tags }}<a href="{{ printf "tags/%s/" (urlize .) | relURL }}">#{{ . }}</a>{{ end }}</span>
  </div>
  <div class="body">{{ .Content }}</div>
</div>
